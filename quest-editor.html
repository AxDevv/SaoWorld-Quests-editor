            saveToStorage();
            renderEditor();
            updateYamlPreview();
        }

        function updateStartNpcAnswerCondition(key, cKey, field, value) {
            currentProject.startNpc.answers[key].conditions[cKey][field] = value;
            saveToStorage();
            updateYamlPreview();
        }

        function removeStartNpcAnswerCondition(key, cKey) {
            delete currentProject.startNpc.answers[key].conditions[cKey];
            saveToStorage();
            renderEditor();
            updateYamlPreview();
        }

        function renderStartNpcNestedDialogue(dialogue, ansKey) {
            const pages = dialogue.pages || {};
            return `

        let currentAutocompleteKey = null;
        let selectedAutocompleteIndex = -1;
        let currentCursorPos = null;

        function handleDescriptionInput(event, key, input) {
            const value = input.value;
            currentCursorPos = input.selectionStart;
            const list = document.getElementById(`autocomplete-${key}`);
            const lastOpenBrace = value.lastIndexOf('{', currentCursorPos);
            if (lastOpenBrace === -1) { list.style.display = 'none'; return; }
            const closeBrace = value.indexOf('}', lastOpenBrace);
            if (closeBrace !== -1 && closeBrace < currentCursorPos) { list.style.display = 'none'; return; }
            const search = value.substring(lastOpenBrace, currentCursorPos).toLowerCase();
            let placeholders = [...DATA.placeholders];
            const obj = currentProject.objectives[key];
            if (obj.targets) {
                Object.keys(obj.targets).forEach(tKey => {
                    const num = parseInt(tKey);
                    if (num > 1) {
                        placeholders.push({ code: `{current_amount_${num}}`, desc: `Qty actuelle target ${num}` });
                        placeholders.push({ code: `{target_${num}}`, desc: `Cible target ${num}` });
                    }
                });
            }
            const matches = placeholders.filter(p => p.code.toLowerCase().startsWith(search));
            if (matches.length === 0) { list.style.display = 'none'; return; }
            currentAutocompleteKey = key;
            selectedAutocompleteIndex = -1;
            list.innerHTML = matches.map(p => `<div class="autocomplete-item" onclick="selectPlaceholder('${key}', '${p.code.replace(/'/g, "\\'")}', ${lastOpenBrace})"><span class="autocomplete-item-code">${p.code}</span><span class="autocomplete-item-desc">${p.desc}</span></div>`).join('');
            list.style.display = 'block';
            list.style.position = 'absolute';
            list.style.top = (input.offsetTop + input.offsetHeight + 4) + 'px';
            list.style.left = input.offsetLeft + 'px';
            list.style.width = Math.max(input.offsetWidth, 200) + 'px';
        }

        function handleDescriptionKeydown(event, key, input) {
            const list = document.getElementById(`autocomplete-${key}`);
            if (list.style.display === 'none') return;
            const items = list.querySelectorAll('.autocomplete-item');
            if (event.key === 'ArrowDown') {
                event.preventDefault();
                selectedAutocompleteIndex = Math.min(selectedAutocompleteIndex + 1, items.length - 1);
                updateSelectedAutocomplete(items);
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                selectedAutocompleteIndex = Math.max(selectedAutocompleteIndex - 1, 0);
                updateSelectedAutocomplete(items);
            } else if (event.key === 'Enter' || event.key === 'Tab') {
                if (selectedAutocompleteIndex >= 0) {
                    event.preventDefault();
                    const selectedItem = items[selectedAutocompleteIndex];
                    const placeholderCode = selectedItem.querySelector('.autocomplete-item-code').textContent;
                    const value = input.value;
                    const cursorPos = input.selectionStart;
                    const lastOpenBrace = value.lastIndexOf('{', cursorPos);
                    insertPlaceholder(key, placeholderCode, lastOpenBrace, cursorPos);
                }
            } else if (event.key === 'Escape') {
                list.style.display = 'none';
                selectedAutocompleteIndex = -1;
            }
        }

        function updateSelectedAutocomplete(items) {
            items.forEach((item, i) => {
                if (i === selectedAutocompleteIndex) { item.style.background = 'var(--primary)'; item.style.color = 'white'; }
                else { item.style.background = ''; item.style.color = ''; }
            });

                        yaml += `    "${key}":\n`;

                                yaml += `          type: ${cond.type}\n`;

        function generateNestedDialogueYaml(dialogue, indent = '') {

                if (page.answers && Object.keys(page.answers).length) {
                    yaml += `${indent}      answers:\n`;
                    Object.entries(page.answers).forEach(([ansKey, ans]) => {
                        yaml += `${indent}        "${ansKey}":\n`;
                        yaml += `${indent}          text: "${escapeYaml(ans.text || '')}"\n`;
                        if (ans.goto) yaml += `${indent}          goto: "${escapeYaml(ans.goto)}"\n`;
                        if (ans.accept) yaml += `${indent}          accept: true\n`;
                        if (ans.next) yaml += `${indent}          next: true\n`;
                        if (ans.conditions && Object.keys(ans.conditions).length) {
                            yaml += `${indent}          conditions:\n`;

                                yaml += `${indent}            "${cKey}":\n`;
                                yaml += `${indent}              type: ${cond.type}\n`;
                                if (cond.type === 'QUEST_STATE') {
                                    yaml += `${indent}              quest_id: "${escapeYaml(cond.questId || '')}"\n`;
                                    yaml += `${indent}              quest_state: ${cond.questState || 'COMPLETED'}\n`;
                                }
                                if (cond.type === 'PLACEHOLDER') {
                                    yaml += `${indent}              placeholder: "${escapeYaml(cond.placeholder || '')}"\n`;
                                    yaml += `${indent}              value: "${escapeYaml(cond.value || '')}"\n`;
                                }
                                if (cond.type === 'PERMISSION') {
                                    yaml += `${indent}              permission: "${escapeYaml(cond.permission || '')}"\n`;
                                }
                            });
                        }
                    });
                }
            });
            return yaml;
        }

        function generateDialogueYaml(dialogue) {
            let yaml = `speaker: ${dialogue.speaker || 'sao'}\n`;
            if (dialogue.name) yaml += `name: "${escapeYaml(dialogue.name)}"\n`;
            if (dialogue.saonpcId) yaml += `saonpc_id: "${escapeYaml(dialogue.saonpcId)}"\n`;
            yaml += `\npages:\n`;
            Object.entries(dialogue.pages || {}).forEach(([key, page]) => {
                yaml += `  "${key}":\n`;
                yaml += `    texts:\n`;
                (page.texts || []).forEach(t => yaml += `      - "${escapeYaml(t)}"\n`);
                if (page.answers && Object.keys(page.answers).length) {
                    yaml += `    answers:\n`;
                    Object.entries(page.answers).forEach(([ansKey, ans]) => {
                        yaml += `      "${ansKey}":\n`;
                        yaml += `        text: "${escapeYaml(ans.text || '')}"\n`;
                        if (ans.goto) yaml += `        goto: "${escapeYaml(ans.goto)}"\n`;
                        if (ans.conditions && Object.keys(ans.conditions).length) {
                            yaml += `        conditions:\n`;
                            Object.entries(ans.conditions).forEach(([cKey, cond]) => {
                                yaml += `          "${cKey}":\n`;
                                yaml += `            type: ${cond.type}\n`;
                                if (cond.type === 'QUEST_STATE') {
                                    yaml += `            quest_id: "${escapeYaml(cond.questId || '')}"\n`;
                                    yaml += `            quest_state: ${cond.questState || 'COMPLETED'}\n`;
                                }
                                if (cond.type === 'PLACEHOLDER') {
                                    yaml += `            placeholder: "${escapeYaml(cond.placeholder || '')}"\n`;
                                    yaml += `            value: "${escapeYaml(cond.value || '')}"\n`;
                                }
                                if (cond.type === 'PERMISSION') {
                                    yaml += `            permission: "${escapeYaml(cond.permission || '')}"\n`;
                                }
                            });
                        }
                    });
                }
            });
            return yaml;
        }

        function escapeHtml(text) { if (!text) return ''; return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

        function escapeYaml(text) { if (!text) return ''; return String(text).replace(/"/g, '\\"').replace(/\n/g, '\\n'); }

        function copyYaml() { const yaml = document.getElementById('yamlOutput').textContent; navigator.clipboard.writeText(yaml).then(() => { alert('YAML copié !'); }); }

        function exportAll() {
            projects.quests.forEach(quest => downloadFile(`${quest.id}.yml`, generateQuestYaml(quest)));
            projects.dialogues.forEach(dialogue => downloadFile(`dialogue-${dialogue.saonpcId || dialogue.id}.yml`, generateDialogueYaml(dialogue)));
        }

        function downloadFile(filename, content) {
            const blob = new Blob([content], { type: 'text/yaml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importFile() { document.getElementById('importModal').classList.add('active'); }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function processImport() {
            const type = document.getElementById('importType').value;
            const yaml = document.getElementById('importYaml').value;
            if (!yaml.trim()) { alert('Veuillez coller du contenu YAML'); return; }
            try {
                const parsed = parseSimpleYaml(yaml);
                if (type === 'quest') {
                    const quest = { id: parsed.id || 'imported_quest', name: parsed.name || 'Quête importée', description: parsed.description || [''], category: parsed.category || 'principale', region: parsed.region, levelRequired: parsed.level_required, autoTrack: parsed.auto_track !== false, autoStart: parsed.auto_start === true, repeatable: parsed.repeatable === true, requirements: parsed.requirements || {}, startNpc: parsed.start_npc, objectives: parsed.objectives || {}, rewards: parsed.rewards || {} };
                    projects.quests.push(quest);
                } else {
                    const dialogue = { id: parsed.id || 'imported_dialogue', speaker: parsed.speaker || 'sao', name: parsed.name, saonpcId: parsed.saonpc_id, pages: parsed.pages || {} };
                    projects.dialogues.push(dialogue);
                }
                saveToStorage();
                renderList();
                closeModal('importModal');
                document.getElementById('importYaml').value = '';
                alert('Import réussi !');
            } catch (e) { alert('Erreur lors de l\'import: ' + e.message); }
        }

        function parseSimpleYaml(yaml) {
            const result = {};
            const lines = yaml.split('\n');
            let stack = [{ obj: result, indent: -1, isArray: false }];
            for (let line of lines) {
                if (!line.trim() || line.trim().startsWith('#')) continue;
                const indent = line.search(/\S|$/);
                const trimmed = line.trim();
                while (stack.length > 1 && stack[stack.length - 1].indent >= indent) stack.pop();
                const current = stack[stack.length - 1];
                if (trimmed.startsWith('- ')) {
                    const item = trimmed.substring(2);
                    const dashIndent = indent;
                    if (item.includes(':')) {
                        const [key, ...valueParts] = item.split(':');
                        const value = valueParts.join(':').trim();
                        const newObj = {};
                        if (value && !value.startsWith('"') && !value.startsWith("'")) newObj[key.replace(/"/g, '').replace(/'/g, '')] = parseValue(value);
                        stack.push({ obj: newObj, indent: dashIndent, isArray: true, parentKey: key.replace(/"/g, '').replace(/'/g, '') });
                    } else { stack[stack.length - 1].listItem = parseValue(item); }
                } else if (trimmed.includes(':')) {
                    const colonIndex = trimmed.indexOf(':');
                    const key = trimmed.substring(0, colonIndex).replace(/"/g, '').replace(/'/g, '');
                    const value = trimmed.substring(colonIndex + 1).trim();
                    if (stack[stack.length - 1].isArray && stack[stack.length - 1].parentKey) {
                        const parent = stack[stack.length - 2];
                        if (!parent.obj[stack[stack.length - 1].parentKey]) parent.obj[stack[stack.length - 1].parentKey] = {};
                        parent.obj[stack[stack.length - 1].parentKey][key] = value === '' ? {} : parseValue(value);
                    } else { current.obj[key] = value === '' || value === '|' || value === '>' ? {} : parseValue(value); }
                    if (value === '' || value === '|' || value === '>') stack.push({ obj: current.obj[key], indent, isArray: false });
                }
            }
            return result;
        }

        function parseValue(value) {
            value = value.trim().replace(/^["']|["']$/g, '');
            if (value === 'true') return true;
            if (value === 'false') return false;
            if (!isNaN(value) && value !== '') return Number(value);
            return value;
        }

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => { document.getElementById('importYaml').value = e.target.result; };
            reader.readAsText(file);
        }

        init();
    </script>
</body>
